<div class="max-w-2xl mx-auto space-y-6">
  <!-- Header -->
  <div>
    <div class="flex items-center gap-3 mb-2">
      <div class="w-8 h-8 rounded-lg bg-[#dd0031]/10 border border-[#dd0031]/20 flex items-center justify-center">
        <svg class="w-4 h-4 text-[#dd0031]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <h1 class="text-white text-xl font-semibold">Forms Demo</h1>
      <span class="text-xs px-2 py-0.5 rounded-full bg-[#dd0031]/10 text-[#dd0031] border border-[#dd0031]/20 font-mono">v22 nightly</span>
    </div>
    <p class="text-[#a0a0a0] text-sm leading-relaxed">
      Angular Signal Forms — a new reactive forms API built on signals with typed field trees, built-in validation, and zero
      <code class="text-white bg-[#2d2d2d] px-1.5 py-0.5 rounded text-xs">AbstractControl</code> boilerplate.
    </p>
  </div>

  <!-- Tabs -->
  <div class="bg-[#1a1a1a] rounded-xl border border-[#2d2d2d] overflow-hidden">
    <div class="flex border-b border-[#2d2d2d]">
      @for (tab of tabs; track tab.id) {
        <button
          (click)="setTab(tab.id)"
          class="flex-1 px-5 py-3.5 text-sm font-medium transition-all duration-200 border-b-2 -mb-px text-left"
          [class.border-[#dd0031]]="activeTab() === tab.id"
          [class.text-[#dd0031]]="activeTab() === tab.id"
          [class.border-transparent]="activeTab() !== tab.id"
          [class.text-[#a0a0a0]]="activeTab() !== tab.id"
          [class.hover:text-white]="activeTab() !== tab.id"
          [class.hover:bg-[#2d2d2d]]="activeTab() !== tab.id"
        >
          {{ tab.label }}
        </button>
      }
    </div>

    <div class="p-5">
      @if (activeTab() === 'signal-forms') {
        <app-signal-forms />
      } @else {
        <app-dynamic-signal-forms />
      }
    </div>
  </div>
</div>
