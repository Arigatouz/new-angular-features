<div class="max-w-2xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Forms Demo</h1>
    <p class="mt-2 text-[#a0a0a0]">Template-driven forms with real-time signal state.</p>
  </div>

  <div class="bg-[#1a1a1a] rounded-xl border border-[#2d2d2d] p-8">
    @if (submitted()) {
      <div class="mb-6 p-4 bg-[#4caf50]/10 border border-[#4caf50]/30 rounded-lg text-[#4caf50] text-sm font-medium">
        Form submitted successfully!
      </div>
    }

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Name</label>
        <input
          type="text"
          [ngModel]="form().name"
          (ngModelChange)="updateField('name', $event)"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all"
          placeholder="Enter your name"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Email</label>
        <input
          type="email"
          [ngModel]="form().email"
          (ngModelChange)="updateField('email', $event)"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all"
          placeholder="you@example.com"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Message</label>
        <textarea
          rows="4"
          [ngModel]="form().message"
          (ngModelChange)="updateField('message', $event)"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all resize-none"
          placeholder="Type your message..."
        ></textarea>
      </div>
      <button
        (click)="onSubmit()"
        class="w-full px-5 py-3 bg-gradient-to-r from-[#dd0031] to-[#c3002f] text-white font-semibold rounded-lg hover:from-[#c3002f] hover:to-[#a00026] transition-all duration-200 shadow-lg shadow-[#dd0031]/20"
      >
        Submit
      </button>
    </div>
  </div>

  <div class="mt-6 bg-[#1a1a1a] rounded-xl border border-[#2d2d2d] p-6">
    <h3 class="text-white font-semibold mb-3">Live Form State</h3>
    <pre class="bg-[#0f0f0f] rounded-lg p-4 text-sm text-[#a0a0a0] overflow-x-auto border border-[#2d2d2d]">{{ form() | json }}</pre>
  </div>
</div>
