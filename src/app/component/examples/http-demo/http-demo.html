<div class="max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">HTTP Demo</h1>
    <p class="mt-2 text-[#a0a0a0]">Fetching data with Angular's signal-based HTTP primitives.</p>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 mb-6 p-1 bg-[#1a1a1a] rounded-xl border border-[#2d2d2d]">
    <button
      (click)="setTab('httpResource')"
      [class]="activeTab() === 'httpResource'
        ? 'flex-1 py-2 px-4 rounded-lg text-sm font-semibold text-white bg-[#dd0031] transition-colors'
        : 'flex-1 py-2 px-4 rounded-lg text-sm font-medium text-[#a0a0a0] hover:text-white hover:bg-[#2d2d2d] transition-colors'"
    >
      httpResource
    </button>
    <button
      (click)="setTab('resource')"
      [class]="activeTab() === 'resource'
        ? 'flex-1 py-2 px-4 rounded-lg text-sm font-semibold text-white bg-[#1976d2] transition-colors'
        : 'flex-1 py-2 px-4 rounded-lg text-sm font-medium text-[#a0a0a0] hover:text-white hover:bg-[#2d2d2d] transition-colors'"
    >
      Resource
    </button>
    <button
      (click)="setTab('rxResource')"
      [class]="activeTab() === 'rxResource'
        ? 'flex-1 py-2 px-4 rounded-lg text-sm font-semibold text-white bg-[#7b1fa2] transition-colors'
        : 'flex-1 py-2 px-4 rounded-lg text-sm font-medium text-[#a0a0a0] hover:text-white hover:bg-[#2d2d2d] transition-colors'"
    >
      rxResource
    </button>
  </div>

  <!-- Tab Content -->
  <div class="bg-[#1a1a1a] rounded-xl border border-[#2d2d2d] p-6">
    @switch (activeTab()) {
      @case ('httpResource') {
        <app-http-resource-demo />
      }
      @case ('resource') {
        <app-resource-demo />
      }
      @case ('rxResource') {
        <app-rx-resource-demo />
      }
    }
  </div>
</div>
