<div class="max-w-2xl mx-auto">
  <div class="text-center mb-12">
    <h1 class="text-4xl font-extrabold text-white tracking-tight">Contact Us</h1>
    <p class="mt-4 text-lg text-[#a0a0a0]">We would love to hear from you. Reach out anytime.</p>
  </div>

  <div class="bg-[#1a1a1a] rounded-xl p-8 border border-[#2d2d2d]">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Name</label>
        <input
          type="text"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all"
          placeholder="Your name"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Email</label>
        <input
          type="email"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all"
          placeholder="you@example.com"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-[#c0c0c0] mb-2">Message</label>
        <textarea
          rows="4"
          class="w-full px-4 py-3 bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg text-white placeholder-[#555] focus:outline-none focus:ring-2 focus:ring-[#dd0031] focus:border-transparent transition-all resize-none"
          placeholder="How can we help?"
        ></textarea>
      </div>
      <button
        type="button"
        class="w-full px-5 py-3 bg-gradient-to-r from-[#dd0031] to-[#c3002f] text-white font-semibold rounded-lg hover:from-[#c3002f] hover:to-[#a00026] transition-all duration-200 shadow-lg shadow-[#dd0031]/20"
      >
        Send Message
      </button>
    </div>
  </div>

  <div class="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
    <div class="p-4 bg-[#1a1a1a] rounded-lg border border-[#2d2d2d]">
      <p class="text-[#888] text-sm">Email</p>
      <p class="text-white font-medium mt-1">hello&#64;angular.dev</p>
    </div>
    <div class="p-4 bg-[#1a1a1a] rounded-lg border border-[#2d2d2d]">
      <p class="text-[#888] text-sm">Phone</p>
      <p class="text-white font-medium mt-1">+1 (555) 123-4567</p>
    </div>
    <div class="p-4 bg-[#1a1a1a] rounded-lg border border-[#2d2d2d]">
      <p class="text-[#888] text-sm">Location</p>
      <p class="text-white font-medium mt-1">San Francisco, CA</p>
    </div>
  </div>
</div>
